<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"> 
	<title>SAO</title>
	<script>
		var name
		var user
		window.onload=function (){

	if(localStorage.name){
		console.log(localStorage.name)
		document.getElementById("header").style.display = "none"
		game()
		
	}else{
		console.log("無資料")
	}
}
function load(){

	if(localStorage.name){
		console.log(localStorage.name)
		document.getElementById("header").style.display = "none"
		game()
		
	}else{
		console.log("無資料")
	}
}
		
		function check(){
		if(typeof(Storage)=="unfefined"){
			alert("你的瀏覽器不支援")
			window.location.reload
		}else{
			name=document.getElementById("name").value
			localStorage.setItem("name",name)
			load()
			
		}
		}
		
		function game(){
			 user=document.getElementById("user")
			user.style.display="block"
			user.innerHTML=localStorage.name+"&nbsp;"
			var main=document.getElementById("main")
			main.style.display="block"
			
			
		}
		function changename(){
			localStorage.removeItem('name')
			var name2=prompt("更改名稱")
	if(name2){
				localStorage.setItem("name",name2)
			user=document.getElementById("user")
			user.innerHTML=localStorage.name+"&nbsp;"
				
			}else{
			
				alert("名字不能空白")
				break
			}
		}
	</script>
  <style>
	  
	  .container{
    display: flex;
    justify-content: center; 
    align-items: center; 
}
	  p{
	font-family:Microsoft JhengHei;	  
		  
	  }
	  main{
	display:none;	  
	  }
	  </style>
  </head>
  <body>
	  <header id="header">
    <div class="container">
	    <label for="name">請輸入名稱</label>
	    <input type="text" id="name"><br>
	    
	  </div>
	  
	   <div class="container">
		      
	  <br><br>
	    <button id="confirm" onclick="check()">確定</button>
	  </div>
	  </header>
 <main id="main" >
	 <p id="user"></p><button onclick="changename()">更改名稱</button>
	  </main>
  </body>
</html>
