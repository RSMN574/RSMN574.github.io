	<script>
		var main
		var name
		var user
		var money=localStorage.money

		window.onload=function (){
var sw=document.body.clientWidth
			if(sw<900){
				alert("建議使用更大的螢幕遊玩")
			}
	if(localStorage.name){
		console.log(localStorage.name)
		document.getElementById("header").style.display = "none"
		game()
		
	}else{
		console.log("無資料")
		localStorage.money=200
		
	}
}
function load(){

	if(localStorage.name){
		console.log(localStorage.name)
		document.getElementById("header").style.display = "none"
		game()
		
	}else{
		console.log("無資料")
	}
}
		
		function check(){
		if(typeof(Storage)=="unfefined"){
			alert("你的瀏覽器不支援")
			window.location.reload
		}else{
			name=document.getElementById("name").value
			localStorage.setItem("name",name)
			load()
			
		}
		}
		
		function game(){
			 user=document.getElementById("user")
			user.style.display="block"
			user.innerHTML=localStorage.name+"&nbsp;"
			main=document.getElementById("main")
			main.style.display="block"
			screenmoney=document.getElementById("alp")
			money=localStorage.money
			screenmoney.innerHTML=localStorage.money
		}
		function changename(){
		
			var name2=prompt("更改名稱")
	                if(name2){
					localStorage.removeItem('name')
				localStorage.setItem("name",name2)
			user=document.getElementById("user")
			user.innerHTML=localStorage.name+"&nbsp;"
				
			}else{
			
				alert("名字不能空白")
				
			}
		}
		var audio = new Audio("https://rsmn574.github.io/1.mp3");

		function playaudio(){
				
				
				
				audio.pause();
				audio2.pause();
				audio3.pause();
				audio4.pause();
				audio5.pause();
				audio6.pause();
				audio7.pause();
				audio8.pause();
				audio9.pause();
				var result=Math.floor(Math.random()*9);
				switch(result){
					case 1:
						console.log(1)
						audio.play();
						break;
						case 2:
						console.log(2)
						audio2.play();
						break;
						case 3:
						console.log(3)
						audio3.play();
						break;
						case 4:
						console.log(4)
						audio4.play();
						break;
						case 5:
						console.log(5)
						audio5.play();
						break;
						case 6:
						audio6.play();
						break;
						case 7:
						audio7.play();
						break;
						case 8:
						audio8.play();
						break;
						case 9:
						audio9.play();
						break;
				}
                  
			}	
			function lottery1(){
				money=localStorage.money
				if(money>=99){
					money-=99
					screenmoney=document.getElementById("alp")
					localStorage.money=money
					screenmoney.innerHTML=localStorage.money
					lottery()
				
				}else{
				alert("阿爾法幣不足")	
					
				}
				
			}
		
		function lottery10(){
			money=localStorage.money
				if(money>=900){
					money-=900
					
					screenmoney=document.getElementById("alp")
					localStorage.money=money
					screenmoney.innerHTML=localStorage.money
					
				
				}else{
					alert("阿爾法幣不足")	
					
				}
			
			}
		
		
		 function lottery(){
			var re=Math.floor(Math.random()*200)

			}
		}
