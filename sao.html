<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"> 
	<title>SAO</title>
	<script>
		var name
		var user
		window.onload=function (){

	if(localStorage.name){
		console.log(localStorage.name)
		document.getElementById("header").style.display = "none"
		game()
		
	}else{
		console.log("無資料")
	}
}
function load(){

	if(localStorage.name){
		console.log(localStorage.name)
		document.getElementById("header").style.display = "none"
		game()
		
	}else{
		console.log("無資料")
	}
}
		
		function check(){
		if(typeof(Storage)=="unfefined"){
			alert("你的瀏覽器不支援")
			window.location.reload
		}else{
			name=document.getElementById("name").value
			localStorage.setItem("name",name)
			load()
			
		}
		}
		
		function game(){
			 user=document.getElementById("user")
			user.style.display="block"
			user.innerHTML=localStorage.name+"&nbsp;"
			var main=document.getElementById("main")
			main.style.display="block"
			
			
		}
		function changename(){
		
			var name2=prompt("更改名稱")
	                if(name2){
					localStorage.removeItem('name')
				localStorage.setItem("name",name2)
			user=document.getElementById("user")
			user.innerHTML=localStorage.name+"&nbsp;"
				
			}else{
			
				alert("名字不能空白")
				
			}
		}
		window.onload=function(){
			var sw=document.body.clientWidth
			if(sw<1000){
				alert("建議使用更大的螢幕遊玩")
			}
				
		}
	</script>
  <style>
	  
	  .container{
    display: flex;
    justify-content: center; 
    align-items: center; 
}
	  p{
	font-family:Microsoft JhengHei;	  
		  
	  }
	  main{
	display:none;	  
	  }
	  #collect{
		  display: flex;
		  position:absolute;
		  top:700px;
		  left:20px;
	  }
	  #lottery{
		  display: flex;
		  position:absolute;
		  top:700px;
		  left:90px;  
		  }
	  #vs{
		 display: flex;
		  position:absolute;
		  top:700px;
		  left:90px;    
		  }
	  </style>
  </head>
  <body>
	  <header id="header">
    <div class="container">
	    <label for="name">請輸入名稱</label>
	    <input type="text" id="name"><br>
	    
	  </div>
	  
	   <div class="container">
		      
	  <br><br>
	    <button id="confirm" onclick="check()">確定</button>
	  </div>
	  </header>
 <main id="main" >
	 <p id="user"></p><button onclick="changename()">更改名稱</button>
	
	 <button id="collect">收集</button>
	  <button id="vs">對戰</button>
	<button id="lottery">抽獎</button>
	 <div  class="container">
