<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8"> 
	<title>Android手機王</title>
 <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0, user-scalable=0">
	
	
	
	
	
	
	<link rel="shortcut icon" href="android-icon.ico">
	<!--CSS--><style>
	body {
background-image: url("images/login/loginBac.jpg");;
background-size: 100%;
background-repeat: no-repeat;
}
#login_frame {
width: 400px;
height: 260px;
padding: 13px;
position: absolute;
left: 50%;
top: 50%;
margin-left: -200px;
margin-top: -200px;
background-color: rgba(240, 255, 255, 0.5);
border-radius: 10px;
text-align: center;
}
form p > * {
display: inline-block;
vertical-align: middle;
}
#image_logo {
margin-top: 22px;
}
.label_input {
font-size: 14px;
font-family: 宋體;
width: 65px;
height: 28px;
line-height: 28px;
text-align: center;
color: white;
background-color: #3CD8FF;
border-top-left-radius: 5px;
border-bottom-left-radius: 5px;
}
.text_field {
width: 278px;
height: 28px;
border-top-right-radius: 5px;
border-bottom-right-radius: 5px;
border: 0;
}
#btn_login {
font-size: 14px;
font-family: 宋體;
width: 120px;
height: 28px;
line-height: 28px;
text-align: center;
color: white;
background-color: #3BD9FF;
border-radius: 6px;
border: 0;
float: left;
}
#forget_pwd {
font-size: 12px;
color: white;
text-decoration: none;
position: relative;
float: right;
top: 5px;
}
#forget_pwd:hover {
color: blue;
text-decoration: underline;
}
#login_control {
padding: 0 28px;
}
  
  </style>
	
</head>
<body>
	<br><br><br><br>
	<div id="login_frame">
<p id="image_logo"><img src="images/login/fly.png"></p>
  <!-- Content here -->
		<form method="post" action="login.js">
<p><label class="label_input">使用者名稱</label><input type="text" id="username" class="text_field"/></p>
<p><label class="label_input">密碼</label><input type="text" id="password" class="text_field"/></p>
<div id="login_control">
<input type="button" id="btn_login" value="登入" onclick="login();"/>
<a id="forget_pwd" href="forget_pwd.html">忘記密碼？</a>
</div>
</form>
</div>

	 
  
  
  </body>
</html>
